# Test-harness nginx — mirrors frontend/ark-ui.nginx, but the gateway is on localhost
# (same container) and /video/ points at the go2rtc sidecar over the compose network.
server {
    listen 80;
    server_name localhost;
    client_max_body_size 500M;

    location / {
        root /var/www/ark-ui/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        root /var/www/ark-ui/html;
        add_header Cache-Control "no-cache" always;
    }

    # API gateway (Express). proxy_buffering off so the managers' SSE streams
    # (firmware progress, network stats) flush through immediately.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Video page -> go2rtc sidecar (WHEP signaling). Media itself flows directly
    # browser<->go2rtc over the published 8555, not through here.
    location /video/ {
        proxy_pass http://go2rtc:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
