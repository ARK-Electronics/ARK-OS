name: ark-autopilot-manager
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Autopilot management service for ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - python3
  - python3-flask
  - python3-pymavlink

contents:
  - src: ../services/autopilot-manager/autopilot_manager.py
    dst: /opt/ark/bin/autopilot_manager.py
    file_info:
      mode: 0755

  - src: ./service-files/autopilot-manager.service
    dst: /etc/systemd/user/autopilot-manager.service
    type: config

scripts:
  postinstall: ./scripts/postinst-autopilot-manager.sh
  preremove: ./scripts/prerm-autopilot-manager.sh
