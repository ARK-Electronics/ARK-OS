name: ark-logloader
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Automatic ULog download and upload service for ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - libssl3
  - libsqlite3-0

contents:
  - src: ../build/logloader/logloader
    dst: /opt/ark/bin/logloader
    file_info:
      mode: 0755

  - src: ./service-files/logloader.service
    dst: /etc/systemd/user/logloader.service
    type: config

scripts:
  postinstall: ./scripts/postinst-logloader.sh
  preremove: ./scripts/prerm-logloader.sh
