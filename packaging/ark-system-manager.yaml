name: ark-system-manager
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Linux system management service for ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - python3
  - python3-flask
  - python3-psutil

contents:
  - src: ../services/system-manager/system_manager.py
    dst: /opt/ark/bin/system_manager.py
    file_info:
      mode: 0755

  - src: ./service-files/system-manager.service
    dst: /etc/systemd/user/system-manager.service
    type: config

scripts:
  postinstall: ./scripts/postinst-system-manager.sh
  preremove: ./scripts/prerm-system-manager.sh
