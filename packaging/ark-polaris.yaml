name: ark-polaris
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Polaris RTK corrections client for MAVLink"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - libssl3
  - libgflags2.2
  - libgoogle-glog0v6
  - libboost-system1.74.0

contents:
  - src: ../build/polaris/polaris-client-mavlink
    dst: /opt/ark/bin/polaris-client-mavlink
    file_info:
      mode: 0755

  - src: ./service-files/polaris.service
    dst: /etc/systemd/user/polaris.service
    type: config

scripts:
  postinstall: ./scripts/postinst-polaris.sh
  preremove: ./scripts/prerm-polaris.sh
