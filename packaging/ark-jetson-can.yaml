name: ark-jetson-can
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Jetson CAN interface enabler for ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

contents:
  - src: ../services/jetson-can/start_can_interface.sh
    dst: /opt/ark/bin/start_can_interface.sh
    file_info:
      mode: 0755

  - src: ../services/jetson-can/stop_can_interface.sh
    dst: /opt/ark/bin/stop_can_interface.sh
    file_info:
      mode: 0755

  - src: ./service-files/jetson-can.service
    dst: /etc/systemd/system/jetson-can.service
    type: config

scripts:
  postinstall: ./scripts/postinst-jetson-can.sh
  preremove: ./scripts/prerm-jetson-can.sh
