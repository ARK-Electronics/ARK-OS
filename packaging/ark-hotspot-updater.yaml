name: ark-hotspot-updater
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Hotspot name updater for ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - network-manager

contents:
  - src: ../services/hotspot-updater/update_hotspot_default.sh
    dst: /opt/ark/bin/update_hotspot_default.sh
    file_info:
      mode: 0755

  - src: ./service-files/hotspot-updater.service
    dst: /etc/systemd/system/hotspot-updater.service
    type: config

scripts:
  postinstall: ./scripts/postinst-hotspot-updater.sh
  preremove: ./scripts/prerm-hotspot-updater.sh
