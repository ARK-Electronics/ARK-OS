name: ark-rtsp-server
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "RTSP server for connected cameras on ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - libgstreamer1.0-0
  - libgstreamer-plugins-base1.0-0
  - gstreamer1.0-plugins-ugly
  - gstreamer1.0-rtsp

contents:
  - src: ../build/rtsp-server/rtsp-server
    dst: /opt/ark/bin/rtsp-server
    file_info:
      mode: 0755

  - src: ./service-files/rtsp-server.service
    dst: /etc/systemd/user/rtsp-server.service
    type: config

scripts:
  postinstall: ./scripts/postinst-rtsp-server.sh
  preremove: ./scripts/prerm-rtsp-server.sh
