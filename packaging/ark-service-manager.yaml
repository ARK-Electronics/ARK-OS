name: ark-service-manager
version: "${VERSION}"
arch: "${ARCH}"
platform: linux
maintainer: "ARK Electronics <support@arkelectron.com>"
description: "Systemd service manager for ARK companion computers"
vendor: "ARK Electronics"
homepage: "https://github.com/ARK-Electronics/ARK-OS"
license: "MIT"

depends:
  - python3
  - python3-flask

contents:
  - src: ../services/service-manager/service_manager.py
    dst: /opt/ark/bin/service_manager.py
    file_info:
      mode: 0755

  - src: ./service-files/service-manager.service
    dst: /etc/systemd/user/service-manager.service
    type: config

scripts:
  postinstall: ./scripts/postinst-service-manager.sh
  preremove: ./scripts/prerm-service-manager.sh
