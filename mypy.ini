# Type-checker config for the Python API services — this is the contract
# enforcement (like clang-tidy for C++). It reads this file the way clang-format
# reads .clang-format.
#
#   install once:        pip install mypy
#   check everything:    mypy                         (uses `files` below)
#   check one file:      mypy services/<svc>/<svc>.py
#
[mypy]
python_version = 3.10
# Device/runtime libs (psutil, jtop, pymavlink, smbus2, flask_socketio, ...) ship
# no type stubs; we enforce OUR contracts, not third-party stubs.
ignore_missing_imports = True
# Services migrated to FastAPI + pydantic. Add each one here as it lands.
files =
    services/system-manager/system_manager.py,
    services/service-manager/service_manager.py,
    services/autopilot-manager/autopilot_manager.py
